<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fff0f5;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
        }
        .card {
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border: 2px solid #ffccd5;
        }
        h1 { color: #d63384; font-size: 32px; }
        p { font-size: 20px; color: #444; line-height: 1.6; }
        .heart { color: #ff4d6d; font-size: 60px; margin-bottom: 10px; }
        .name { font-weight: bold; color: #d63384; }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart">❤</div>
        <h1>ئەی ئەسولی ئازیزم، داوای لێبوردن دەکەم</h1>
        <p>تکایە دڵتەنگییەکەم قبوڵ بکە.<br>
        تۆ بۆ من زۆر گرانبەهای، ناتوانم ببینم دڵت لە من شکاو بێت.<br>
        ئامادەم هەموو شتێک بکەم بۆ ئەوەی زەردەخەنە بۆ لێوەکانت بگەڕێنمەوە.</p>
    </div>

</body>
</html>
